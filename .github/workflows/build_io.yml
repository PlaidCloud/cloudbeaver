name: IO Build Docker Image
on:
#  push:
#    branches:
#      - master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  build-io:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Create tag
        id: docker_tag
        run: |
          commit_tag=${GITHUB_SHA:0:7}
          echo "tag=${commit_tag}-${{ github.run_number }}-${{ github.run_attempt }}" >> $GITHUB_OUTPUT
      - name: Verify tag
        run: echo ${{ steps.docker_tag.outputs.tag }}
      - name: Login to GCR
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          push: true
          pull: true
          no-cache: true
          file: ./docker/cloudbeaver-ce/Dockerfile
          build-args: |
            PLAID_BUILD_TAG=${{ steps.docker_tag.outputs.tag }}
          tags: us-docker.pkg.dev/plaidcloud-build/us-plaidcloud/cloudbeaver:latest,us-docker.pkg.dev/plaidcloud-build/us-plaidcloud/cloudbeaver:${{ steps.docker_tag.outputs.tag }}
