name: IO Build Docker Image
on:
#  push:
#    branches:
#      - master
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
jobs:
  build-io:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
# Backend Build
      - uses: actions/checkout@v4
        with:
          path: cloudbeaver

      - name: Clone Deps Repositories
        uses: dbeaver/github-actions/clone-repositories@devel
        with:
          project_deps_path: "./cloudbeaver/project.deps"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: maven

      - uses: dbeaver/github-actions/install-maven@devel

      - name: Run build script
        run: ./build-backend.sh
        shell: bash
        working-directory: ./cloudbeaver/deploy


# Frontend Build
      - run: corepack enable
        working-directory: ./cloudbeaver/webapp
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: yarn
          cache-dependency-path: cloudbeaver/webapp/yarn.lock

      - name: restore node_modules
        uses: actions/cache@v4
        with:
          path: "cloudbeaver/webapp/**/node_modules"
          key: ${{ runner.os }}-node_modules-${{ hashFiles('cloudbeaver/webapp/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node_modules-

      - name: restore typescript cache
        uses: actions/cache@v4
        with:
          path: "cloudbeaver/webapp/**/packages/*/dist"
          key: ${{ runner.os }}-dist-${{ hashFiles('cloudbeaver/webapp/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-dist-

      - name: yarn clean
        if: env.skip_cache == 'true'
        working-directory: ./cloudbeaver/webapp
        run: yarn clear

      - run: yarn install --immutable
        working-directory: ./cloudbeaver/webapp

      - run: yarn bundle
        working-directory: ./cloudbeaver/webapp/packages/product-default

      - run: yarn test
        working-directory: ./cloudbeaver/webapp


# Create and tag image
      - name: Create tag
        id: docker_tag
        run: |
          commit_tag=${GITHUB_SHA:0:7}
          echo "tag=${commit_tag}-${{ github.run_number }}-${{ github.run_attempt }}" >> $GITHUB_OUTPUT
      - name: Verify tag
        run: echo ${{ steps.docker_tag.outputs.tag }}
      - name: Login to GCR
        uses: docker/login-action@v3
        with:
          registry: us-docker.pkg.dev
          username: _json_key
          password: ${{ secrets.GCR_JSON_KEY }}
      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@v5
        with:
          context: ./cloudbeaver/deploy
          push: true
          pull: true
          no-cache: true
          file: ./docker/cloudbeaver-ce/Dockerfile
          build-args: |
            PLAID_BUILD_TAG=${{ steps.docker_tag.outputs.tag }}
          tags: us-docker.pkg.dev/plaidcloud-build/us-plaidcloud/cloudbeaver:latest,us-docker.pkg.dev/plaidcloud-build/us-plaidcloud/cloudbeaver:${{ steps.docker_tag.outputs.tag }}
